<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 饮食计划助手</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">🥗</span>
      <h1>创建账号</h1>
      <p>开始你的健康饮食之旅</p>
    </div>

    <form id="register-form-only" class="auth-form active" autocomplete="off">
      <div class="form-group">
        <label>用户名</label>
        <div class="input-icon">
          <span class="icon">👤</span>
          <input type="text" id="reg-username" class="form-control" placeholder="请输入用户名">
        </div>
        <div class="form-error" id="reg-username-error"></div>
      </div>

      <div class="form-group">
        <label>昵称</label>
        <div class="input-icon">
          <span class="icon">✏️</span>
          <input type="text" id="reg-nickname" class="form-control" placeholder="给自己取个名字（选填）">
        </div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="reg-password" class="form-control" placeholder="请输入密码（至少6位）">
        </div>
        <div class="form-error" id="reg-password-error"></div>
      </div>

      <div class="form-group">
        <label>确认密码</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="reg-confirm-password" class="form-control" placeholder="请再次输入密码">
        </div>
        <div class="form-error" id="reg-confirm-error"></div>
      </div>

      <button type="button" id="btn-register" class="btn-submit">注 册</button>
    </form>

    <div class="auth-footer">
      <p>已有账号？<a href="login.html">立即登录</a></p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (APP.auth.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('btn-register').addEventListener('click', async () => {
        document.querySelectorAll('.form-error').forEach((el) => (el.textContent = ''));

        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirmPassword = document.getElementById('reg-confirm-password').value;
        const nickname = document.getElementById('reg-nickname').value.trim();

        let hasError = false;
        if (!username) {
          document.getElementById('reg-username-error').textContent = '请输入用户名';
          hasError = true;
        }
        if (!password) {
          document.getElementById('reg-password-error').textContent = '请输入密码';
          hasError = true;
        } else if (password.length < 6) {
          document.getElementById('reg-password-error').textContent = '密码至少6位';
          hasError = true;
        }
        if (password !== confirmPassword) {
          document.getElementById('reg-confirm-error').textContent = '两次密码不一致';
          hasError = true;
        }
        if (hasError) return;

        const btn = document.getElementById('btn-register');
        btn.disabled = true;
        btn.textContent = '注册中...';

        try {
          const res = await APP.api.post('/user/register', {
            username,
            password,
            nickname: nickname || username,
          });
          if (res && (res.code === 201 || res.code === 200)) {
            APP.toast('注册成功，请登录', 'success');
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 1000);
          }
        } catch (err) {
          document.getElementById('reg-username-error').textContent = err.message;
        } finally {
          btn.disabled = false;
          btn.textContent = '注 册';
        }
      });
    });
  </script>
</body>
</html>
