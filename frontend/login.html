<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>饮食计划助手 - 登录注册</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">🥗</span>
      <h1>饮食计划助手</h1>
      <p>科学管理你的每日饮食</p>
    </div>

    <div class="auth-tabs">
      <button class="tab active" data-tab="login">登 录</button>
      <button class="tab" data-tab="register">注 册</button>
    </div>

    <form id="login-form" class="auth-form active" autocomplete="off">
      <div class="form-group">
        <label>用户名</label>
        <div class="input-icon">
          <span class="icon">👤</span>
          <input type="text" id="login-username" class="form-control" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-error" id="login-username-error"></div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="login-password" class="form-control" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="form-error" id="login-password-error"></div>
      </div>

      <button type="button" id="btn-login" class="btn-submit">登 录</button>
    </form>

    <form id="register-form" class="auth-form" autocomplete="off">
      <div class="form-group">
        <label>用户名</label>
        <div class="input-icon">
          <span class="icon">👤</span>
          <input type="text" id="reg-username" class="form-control" placeholder="请输入用户名">
        </div>
        <div class="form-error" id="reg-username-error"></div>
      </div>

      <div class="form-group">
        <label>昵称</label>
        <div class="input-icon">
          <span class="icon">✏️</span>
          <input type="text" id="reg-nickname" class="form-control" placeholder="给自己取个名字（选填）">
        </div>
        <div class="form-error" id="reg-nickname-error"></div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="reg-password" class="form-control" placeholder="请输入密码（至少6位）">
        </div>
        <div class="form-error" id="reg-password-error"></div>
      </div>

      <div class="form-group">
        <label>确认密码</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="reg-confirm-password" class="form-control" placeholder="请再次输入密码">
        </div>
        <div class="form-error" id="reg-confirm-error"></div>
      </div>

      <button type="button" id="btn-register" class="btn-submit">注 册</button>
    </form>

    <div class="auth-footer">
      <p>已有账号？<a onclick="document.querySelector('.auth-tabs .tab[data-tab=login]').click()">立即登录</a></p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
